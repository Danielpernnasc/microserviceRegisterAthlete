<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a2535;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hexCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hexApp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#062819;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hexInfra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d1a00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#261100;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="410" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="1">ARQUITETURA HEXAGONAL — microserviceRegisterAthlete</text>
  <text x="410" y="52" text-anchor="middle" fill="#64b5f6" font-size="11" letter-spacing="0.5">Ports &amp; Adapters · Java 21 · Spring Boot 3 · MongoDB Atlas · JWT</text>
  <line x1="60" y1="60" x2="760" y2="60" stroke="#2a3f5f" stroke-width="1"/>

  <!-- ═══ INFRA RING (outer) ═══ -->
  <!-- Hexagon outline outer ring -->
  <polygon points="410,80 660,222 660,394 410,480 160,394 160,222" 
           fill="url(#hexInfra)" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.85"/>
  <text x="410" y="498" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600" letter-spacing="1">INFRAESTRUTURA</text>

  <!-- ═══ APP RING (middle) ═══ -->
  <polygon points="410,112 620,236 620,368 410,448 200,368 200,236"
           fill="url(#hexApp)" stroke="#34d399" stroke-width="1.5" opacity="0.9"/>
  <text x="410" y="462" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600" letter-spacing="1">APLICAÇÃO</text>

  <!-- ═══ DOMAIN CORE (inner) ═══ -->
  <polygon points="410,148 580,254 580,338 410,414 240,338 240,254"
           fill="url(#hexCore)" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
  <text x="410" y="288" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">DOMÍNIO</text>
  <text x="410" y="306" text-anchor="middle" fill="#60a5fa" font-size="10">Athlete · AuthToken</text>
  <text x="410" y="320" text-anchor="middle" fill="#60a5fa" font-size="10">AthleteService</text>
  <text x="410" y="334" text-anchor="middle" fill="#60a5fa" font-size="10">AuthService</text>

  <!-- ═══ PORTS labels ═══ -->
  <!-- Left port - in -->
  <text x="212" y="300" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">PORT IN</text>
  <text x="212" y="312" text-anchor="middle" fill="#c4b5fd" font-size="8">AthleteUseCase</text>
  <text x="212" y="323" text-anchor="middle" fill="#c4b5fd" font-size="8">AuthUseCase</text>

  <!-- Right port - out -->
  <text x="608" y="300" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">PORT OUT</text>
  <text x="608" y="312" text-anchor="middle" fill="#c4b5fd" font-size="8">AthleteRepository</text>
  <text x="608" y="323" text-anchor="middle" fill="#c4b5fd" font-size="8">TokenProvider</text>

  <!-- ═══ ADAPTERS - INPUT side ═══ -->
  <!-- REST Adapter -->
  <rect x="68" y="182" width="90" height="44" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="113" y="200" text-anchor="middle" fill="#818cf8" font-size="8" font-weight="700">REST ADAPTER</text>
  <text x="113" y="213" text-anchor="middle" fill="#a5b4fc" font-size="8">AuthController</text>
  <text x="113" y="224" text-anchor="middle" fill="#a5b4fc" font-size="8">AthleteController</text>

  <!-- Security Filter -->
  <rect x="68" y="238" width="90" height="34" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="113" y="254" text-anchor="middle" fill="#818cf8" font-size="8" font-weight="700">SECURITY</text>
  <text x="113" y="266" text-anchor="middle" fill="#a5b4fc" font-size="8">JwtAuthFilter</text>

  <!-- Arrows input -->
  <line x1="158" y1="200" x2="200" y2="270" stroke="#818cf8" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="158" y1="252" x2="200" y2="280" stroke="#818cf8" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

  <!-- ═══ ADAPTERS - OUTPUT side ═══ -->
  <!-- MongoDB Adapter -->
  <rect x="660" y="200" width="96" height="34" rx="6" fill="#1c2f1a" stroke="#4ade80" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="708" y="216" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="700">MONGO ADAPTER</text>
  <text x="708" y="228" text-anchor="middle" fill="#86efac" font-size="8">AthleteMongoRepo</text>

  <!-- JWT Adapter -->
  <rect x="660" y="246" width="96" height="34" rx="6" fill="#1c2f1a" stroke="#4ade80" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="708" y="262" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="700">JWT ADAPTER</text>
  <text x="708" y="274" text-anchor="middle" fill="#86efac" font-size="8">JwtTokenProviderImpl</text>

  <!-- Arrows output -->
  <line x1="580" y1="275" x2="660" y2="218" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <line x1="580" y1="285" x2="660" y2="263" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrowGreen)"/>

  <!-- ═══ EXTERNAL - Input ═══ -->
  <!-- Client HTTP -->
  <rect x="10" y="160" width="56" height="32" rx="5" fill="#111827" stroke="#6366f1" stroke-width="1" filter="url(#shadow)"/>
  <text x="38" y="175" text-anchor="middle" fill="#6366f1" font-size="8" font-weight="700">CLIENT</text>
  <text x="38" y="186" text-anchor="middle" fill="#818cf8" font-size="7">HTTP/REST</text>
  <line x1="66" y1="176" x2="68" y2="200" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Swagger -->
  <rect x="10" y="202" width="56" height="32" rx="5" fill="#111827" stroke="#6366f1" stroke-width="1" filter="url(#shadow)"/>
  <text x="38" y="217" text-anchor="middle" fill="#6366f1" font-size="8" font-weight="700">SWAGGER</text>
  <text x="38" y="228" text-anchor="middle" fill="#818cf8" font-size="7">OpenAPI 3</text>
  <line x1="66" y1="218" x2="68" y2="248" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ═══ EXTERNAL - Output ═══ -->
  <!-- MongoDB Atlas -->
  <rect x="758" y="195" width="54" height="32" rx="5" fill="#111827" stroke="#16a34a" stroke-width="1" filter="url(#shadow)"/>
  <text x="785" y="210" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="700">MONGO</text>
  <text x="785" y="221" text-anchor="middle" fill="#4ade80" font-size="7">Atlas Cloud</text>
  <line x1="756" y1="217" x2="756" y2="217" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="756" y1="217" x2="758" y2="217" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- JWT Secret -->
  <rect x="758" y="237" width="54" height="32" rx="5" fill="#111827" stroke="#16a34a" stroke-width="1" filter="url(#shadow)"/>
  <text x="785" y="252" text-anchor="middle" fill="#16a34a" font-size="8" font-weight="700">JWT</text>
  <text x="785" y="263" text-anchor="middle" fill="#4ade80" font-size="7">jjwt lib</text>

  <!-- ═══ INTEGRATIONS (top) ═══ -->
  <!-- TrainDay ecosystem -->
  <rect x="280" y="68" width="260" height="28" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="410" y="82" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">🏋️ TrainDay Ecosystem</text>
  <text x="410" y="92" text-anchor="middle" fill="#f59e0b" font-size="8">RegisterTrain (8081) · HealthyHistory (8082)</text>

  <!-- ═══ OBSERVABILITY (bottom) ═══ -->
  <rect x="240" y="508" width="340" height="32" rx="6" fill="#1a1a2e" stroke="#fb923c" stroke-width="1" filter="url(#shadow)"/>
  <text x="410" y="522" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="700">OBSERVABILIDADE</text>
  <text x="410" y="534" text-anchor="middle" fill="#fdba74" font-size="8">Actuator · Micrometer · Prometheus · Grafana · SonarQube</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- CI/CD badge -->
  <rect x="660" y="68" width="92" height="26" rx="5" fill="#111827" stroke="#64748b" stroke-width="1"/>
  <text x="706" y="80" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">GitHub Actions</text>
  <text x="706" y="90" text-anchor="middle" fill="#64748b" font-size="7">CI/CD Pipeline</text>

  <!-- Docker badge -->
  <rect x="68" y="68" width="80" height="26" rx="5" fill="#111827" stroke="#64748b" stroke-width="1"/>
  <text x="108" y="80" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">Docker</text>
  <text x="108" y="90" text-anchor="middle" fill="#64748b" font-size="7">Compose · K8s</text>
</svg>
